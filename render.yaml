services:
  - type: web
    name: studyforge-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-2.5-flash-lite
      - key: ALLOWED_ORIGINS
        value: https://studyforge-web.onrender.com
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: MAX_TEXT_LENGTH
        value: 50000

  - type: web
    name: studyforge-web
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://studyforge-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
